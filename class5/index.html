<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-clifford: #da373d;
            --color-lightsky: #cbebf7;
            --color-success: #007a55;
            --color-danger: #c70036;
            --color-success-strong: #006045;
            --color-danger-strong: #a50036;
            --width-fullM100: calc(100% - 100px);
            /* --width-100: 100px; */
        }

        .btn{
            padding:5px 8px;
            border:none;
            border-radius:2px;
            font-size:13px;
            font-weight:600;
            background:rgba(0, 0, 0, 0.2);
        }

        .disabled {
            opacity:0.6;
        }

        .disabled .taskNameWrapper{
            text-decoration:line-through;
        }
    </style>
</head>

<body>

    <div
        class="outerWrapper w-full bg-linear-to-r/decreasing from-indigo-500 to-teal-400 h-screen flex items-center justify-center">
        <div
            class="innerWrapper w-full mx-auto lg:w-1/2 max-w-2xl bg-lightsky rounded-xl overflow-hidden border-10 border-solid border-white">
            <div class="innerWrapperChild">
                <div class="innerRowHeader w-full px-3 py-3 mb-3 border-b-2 border-solid border-neutral-300">
                    <h1 class="text-red text-3xl leading-10 text-center font-semibold text-gray-500">To Do App</h1>
                </div>

                <div class="innerRow max-w-full flex justify-center items-center mx-3 my-3 bg-white">
                    <input id="entertaskinput"
                        class="w-fullM100 pl-3 pr-3 py-3 outline-none border-1 border-solid border-transparent focus:border-black"
                        type="text" placeholder="Enter Task">

                    <button id="addtaskbutton"
                        class="w-25 text-lg bg-yellow-500 hover:bg-yellow-300 border-1 border-solid border-yellow-300 text-black cursor-pointer font-semibold py-3 px-3">Add
                        Task</button>
                </div>
            </div>

            <div id="tasklistwrapper" class="innerWrapperChild max-h-100 overflow-y-auto">
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
